name: Deploy Workers

on:
  push:
    branches:
      - master
    paths:
      - "workers/**"

jobs:
  deploy-email-validation-worker:
    name: Deploy email-validation-worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/email-validation-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: workers/email-validation-worker/package-lock.json

      - run: npm ci

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
